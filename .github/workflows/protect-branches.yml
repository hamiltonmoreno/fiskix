name: Protect Main Branches

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  administration: write

jobs:
  protect:
    name: Apply branch protection rules
    runs-on: ubuntu-latest
    steps:
      - name: Protect main and master
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branches = ['main', 'master'];
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (const branch of branches) {
              // Check if branch exists before trying to protect it
              try {
                await github.rest.repos.getBranch({ owner, repo, branch });
              } catch (e) {
                if (e.status === 404) {
                  console.log(`Branch "${branch}" does not exist — skipping.`);
                  continue;
                }
                throw e;
              }

              await github.rest.repos.updateBranchProtection({
                owner,
                repo,
                branch,
                required_status_checks: null,
                enforce_admins: true,
                required_pull_request_reviews: {
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: true,
                  required_approving_review_count: 1,
                },
                restrictions: null,
                allow_force_pushes: false,
                allow_deletions: false,
              });

              console.log(`Branch protection applied to "${branch}".`);
            }
